<!DOCTYPE html>
<html>
<head>
    <title>Zeba Construction</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🏗 Zeba Construction</h1>
    <p>Professional Cost Calculator</p>
</header>

<div class="container">

    <div class="card">
        <h2>Project Details</h2>

        <input id="siteName" placeholder="Site Name">
        <input id="labour" placeholder="Labour Cost">
        <input id="material" placeholder="Material Cost">
        <input id="other" placeholder="Other Cost">

        <button onclick="calculate()">Calculate</button>

        <h3>Total: ₹ <span id="total">0</span></h3>

        <button onclick="saveData()">Save Project</button>
        <button onclick="downloadExcel()">Download Excel</button>
    </div>

    <div class="card">
        <h2>Saved Projects</h2>
        <ul id="list"></ul>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
